
postgres:
  image: 
    repository: postgres
    tag: 12.0-alpine
  replicas: 1
  user: admin
  db: storedb
  password: password          
  storage: 10Gi
  storageClass: local-path


fastapi:
  image: 
    repository: pandrieu/fastapi
    tag: v1
  replicas: 3
  containerPort: 5000         


ingress:
  host: pandrieu.abrdns.com  


