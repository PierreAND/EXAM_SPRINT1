  image: dpage/pgadmin4
  replicas: 1
  email: admin@pandrieu.local
  password: password


cronjob:
  schedule: "*/5 * * * *"
  image:
    repository: curlimages/curl
    tag: latest
  dynurl: "TOKEN_DYNHOST"   